<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save to Lumina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0c0918;
      color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif;
      padding: 18px;
    }

    .header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .header h3 { font-size: 14px; font-weight: 700; }
    .header-logo {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #a78bfa;
    }

    .field { margin-bottom: 11px; }
    .field label {
      display: block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); margin-bottom: 5px;
    }
    .field input {
      width: 100%; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      padding: 8px 10px; color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif; font-size: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: rgba(167,139,250,0.5); }
    .field input[readonly] { color: rgba(255,255,255,0.45); cursor: default; }

    .tags-section { margin-bottom: 11px; }
    .tags-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 6px;
    }

    .tag-list { display: flex; gap: 5px; flex-wrap: wrap; min-height: 22px; margin-bottom: 8px; }
    .tag-list:empty::before {
      content: 'No tags yet — create one below';
      font-size: 11px; color: rgba(255,255,255,0.25); font-style: italic;
    }
    .tag-toggle {
      padding: 3px 9px; border-radius: 20px; cursor: pointer;
      font-size: 10px; font-weight: 600; font-family: 'Inter', sans-serif;
      border: 1.5px solid transparent; transition: all 0.12s; opacity: 0.45;
      background: none;
    }
    .tag-toggle.selected { opacity: 1; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 0; }

    .new-tag-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px;
    }

    .tag-colors { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
    .tag-color-swatch {
      width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s;
      padding: 0; outline: none;
    }
    .tag-color-swatch:hover { transform: scale(1.2); }
    .tag-color-swatch.selected { border-color: white; }

    .new-tag-row { display: flex; gap: 6px; }
    .new-tag-input {
      flex: 1; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      padding: 6px 9px; color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif; font-size: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .new-tag-input:focus { border-color: rgba(167,139,250,0.5); }
    .new-tag-add {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55); cursor: pointer;
      padding: 6px 10px; border-radius: 7px;
      font-size: 11px; font-weight: 500; font-family: 'Inter', sans-serif;
      transition: all 0.12s; white-space: nowrap;
    }
    .new-tag-add:hover { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.9); }

    .btn-save {
      width: 100%; margin-top: 14px; padding: 10px;
      background: #a78bfa; border: none; border-radius: 9px;
      color: #1a0f2e; font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #c4b5fd; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      margin-top: 10px; padding: 8px 12px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
      border-radius: 8px; font-size: 12px; color: #86efac;
      text-align: center; display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">Lumina</span>
    <h3>Save Link</h3>
  </div>

  <div class="field">
    <label>URL</label>
    <input id="url" type="url" readonly />
  </div>
  <div class="field">
    <label>Title</label>
    <input id="title" type="text" placeholder="Page title" />
  </div>

  <div class="tags-section">
    <div class="tags-label">Tags</div>
    <div class="tag-list" id="tag-list"></div>

    <div class="divider"></div>

    <div class="new-tag-label">New tag</div>
    <div class="tag-colors" id="tag-colors"></div>
    <div class="new-tag-row">
      <input class="new-tag-input" id="new-tag-input" type="text" placeholder="Tag name…" maxlength="24" />
      <button class="new-tag-add" id="new-tag-add">Add</button>
    </div>
  </div>

  <button class="btn-save" id="save-btn">Save Link</button>
  <div class="toast" id="toast">Saved to Lumina!</div>

  <script src="popup.js"></script>
</body>
</html>
