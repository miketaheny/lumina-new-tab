name: ghflow plan
on:
  issues:
    types: [labeled]
jobs:
  plan:
    if: github.event.label.name == 'claude:ready' || github.event.label.name == 'claude:plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
      - uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: |
            Plan GitHub issue #${{ github.event.issue.number }} in this repository.

            1. Read the issue body and all existing comments.
            2. Read any files the issue references.
            3. Produce a plan whose first line is exactly `## Plan`. Include sections:
               - Approach
               - Files to touch
               - Acceptance criteria
               - Risks / questions
            4. Post the plan as a single issue comment via `gh issue comment`.
            5. Remove labels `claude:ready` and `claude:plan` from the issue.
            6. Add label `claude:plan-ready`.

            Do not create a branch, worktree, or PR. This is a planning-only pass.
