name: Build zip

# Builds the distributable extension zip whenever a commit on any branch
# changes the "version" field in manifest.json. The zip is uploaded as a
# workflow artifact (downloadable from the Actions run page) — no GitHub
# Release or tag is created.

on:
  push:
    branches:
      - '**'
    paths:
      - 'manifest.json'

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: version
        run: |
          NEW=$(jq -r .version manifest.json)
          OLD=$(git show HEAD^:manifest.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change ($NEW); skipping build."
          fi

      - name: Set up Node 20
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm install --no-audit --no-fund

      - name: Build tiptap bundle
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Build distributable zip
        if: steps.version.outputs.changed == 'true'
        run: bash bin/build-zip.sh

      - name: Upload zip artifact
        if: steps.version.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lumina-new-tab-${{ steps.version.outputs.new }}
          path: lumina-new-tab-*.zip
          if-no-files-found: error
