name: ghf self-review
on:
  issues:
    types: [labeled]
jobs:
  selfreview:
    if: github.event.label.name == 'claude:review'
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Self-review the PR linked to issue #${{ github.event.issue.number }} in this repository.

            1. Find the PR that includes `Closes #${{ github.event.issue.number }}` in its body.
            2. Read the full PR diff.
            3. Post a single PR comment whose first line is exactly `## Self-Review`. Include:
               - Diff summary (files + intent)
               - Test coverage notes
               - Anything stubbed, skipped, or mocked (be honest)
               - Deviations from the `## Plan` comment on the issue, with reasons
            4. If a `## Self-Review` comment already exists on the PR, do not duplicate — just proceed to step 5.
            5. On the issue: remove label `claude:review`, add label `claude:done`.
